<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Pagina non trovata | Francesco Castaldi</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="photos/favicon.ico" type="image/x-icon">
    <style>
        .error-container {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-family: monospace;
            color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(59,130,246,0.3);
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .error-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header id="site-header"></header>
    <main class="main-content" style="flex:1;">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1>Pagina non trovata</h1>
            <p class="error-message">La risorsa che stai cercando non esiste o è stata spostata.</p>
            <div class="error-links">
                <a href="/" class="btn-primary">🏠 Torna alla home</a>
                <a href="/contact.html" class="btn-secondary">✉️ Contattami</a>
            </div>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <canvas id="bg-canvas"></canvas>
    <script src="main.js" defer></script>
</body>
</html>
