    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));

      margin-top: 2rem;

    .blog-card {

      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      opacity: 0;
      transition: opacity var(--transition-base);
    }
    
    .blog-card:hover {
      border-color: var(--border-glow);
      transform: translateY(-6px);
      box-shadow: var(--shadow-md), 0 20px 40px rgba(0, 0, 0, 0.3);
      background: var(--bg-card-hover);
    }
    
    .blog-card:hover::before {
      opacity: 1;
    }
    
    .blog-category {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
      display: inline-block;
    }
    
    .blog-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.3;
    }
    
    .blog-excerpt {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      flex: 1;
    }
    
    .blog-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    
    .blog-read-more {
      color: var(--accent-blue);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition-fast);
    }
    
    .blog-read-more:hover {
      color: var(--accent-cyan);
      gap: 0.75rem;
    }
    
    .filter-tabs {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    
    .filter-tab {
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      transition: var(--transition-base);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .filter-tab:hover,
    .filter-tab.active {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: var(--accent-blue-dim);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 3rem;
    }
    
    .page-link {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: var(--transition-base);
    }
    
    .page-link:hover,
    .page-link.active {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: var(--accent-blue-dim);
    }

      {

    let currentPage = 1;
    const postsPerPage = 9;
    let currentFilter = 'all';
    
    function renderPosts(filter = 'all', page = 1) {
      const grid = document.getElementById('blogGrid');
      const filteredPosts = filter === 'all' 
        ? blogPosts 
        : blogPosts.filter(post => post.category === filter);
      
      const totalPages = Math.ceil(filteredPosts.length / postsPerPage);
      const startIndex = (page - 1) * postsPerPage;
      const endIndex = startIndex + postsPerPage;
      const postsToShow = filteredPosts.slice(startIndex, endIndex);
      
      grid.innerHTML = postsToShow.map(post => `
        <article class="blog-card reveal-on-scroll">
          <span class="blog-category">${post.category}</span>
          <h3>${post.title}</h3>
          <p class="blog-excerpt">${post.excerpt}</p>
          <div class="blog-meta">
            <span>${formatDate(post.date)}</span>
            <a href="${post.slug}.html" class="blog-read-more">
              Leggi →
            </a>
          </div>
        </article>
      `).join('');
      
      renderPagination(filteredPosts.length, page);
      
      // Reveal animation
      setTimeout(() => {
        document.querySelectorAll('.reveal-on-scroll').forEach(el => {
          el.classList.add('revealed');
        });
      }, 100);
    }
    
    function renderPagination(totalPosts, currentPage) {
      const pagination = document.getElementById('pagination');
      const totalPages = Math.ceil(totalPosts / postsPerPage);
      
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }
      
      let html = '';
      for (let i = 1; i <= totalPages; i++) {
        html += `
          <a href="#" class="page-link ${i === currentPage ? 'active' : ''}" 
             onclick="event.preventDefault(); currentPage=${i}; renderPosts(currentFilter, ${i}); window.scrollTo({top: 400, behavior: 'smooth'});">
            ${i}
          </a>
        `;
      }
      pagination.innerHTML = html;
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('it-IT', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
    }
    
    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        currentPage = 1;
        renderPosts(currentFilter, currentPage);
      });
    });
    
    // Initial render
    renderPosts('all', 1);
