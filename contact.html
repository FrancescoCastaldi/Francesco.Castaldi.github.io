<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatti - Francesco Castaldi</title>
  <meta name="description" content="Contatta Francesco Castaldi. Sono disponibile per parlare di data engineering, healthcare IT, ciclismo o qualsiasi cosa di interessante.">
  <link rel="canonical" href="https://francescocastaldi.github.io/Francesco.Castaldi.github.io/contact.html">
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="icon" href="photos/favicon.ico" type="image/x-icon">
  <script src="main.js" defer></script>
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    (function() {
      emailjs.init("OzP2S3TnbouKhEvz7");
    })();
  </script>
</head>
<body>
  <header id="site-header"></header>

  <main class="main-content subpage-main">

    <!-- HERO -->
    <section class="page-hero">
      <div>
        <h1>Contatti</h1>
        <p>Sono Francesco. Ingegnere informatico, appassionato di dati, ciclismo e sistemi che funzionano bene.<br>Se vuoi scrivermi per qualsiasi motivo, sono qui.</p>
      </div>
    </section>

    <!-- CONNESSIONI -->
    <section class="content-panel" style="padding: 2rem 1.5rem;">
      <h2 style="margin-bottom: 1.5rem; font-size: 1rem; letter-spacing: 0.1em; opacity: 0.6;">TROVAMI SU</h2>
      <div style="display: flex; flex-wrap: wrap; gap: 1rem;">

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/in/francescocastaldi"
           target="_blank" rel="noopener noreferrer"
           class="btn-secondary"
           style="display:inline-flex;align-items:center;gap:0.5rem;"
           aria-label="Profilo LinkedIn di Francesco Castaldi">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>

        <!-- GitHub -->
        <a href="https://github.com/FrancescoCastaldi"
           target="_blank" rel="noopener noreferrer"
           class="btn-secondary"
           style="display:inline-flex;align-items:center;gap:0.5rem;"
           aria-label="Profilo GitHub di Francesco Castaldi">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          GitHub
        </a>

        <!-- Strava -->
        <a href="https://www.strava.com/athletes/francescocastaldi"
           target="_blank" rel="noopener noreferrer"
           class="btn-secondary"
           style="display:inline-flex;align-items:center;gap:0.5rem;"
           aria-label="Profilo Strava di Francesco Castaldi">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
          Strava
        </a>

      </div>
    </section>

    <!-- FORM -->
    <section class="content-panel" style="padding: 2rem 1.5rem;">
      <h2 style="margin-bottom: 0.5rem; font-size: 1rem; letter-spacing: 0.1em; opacity: 0.6;">SCRIVIMI</h2>
      <p style="margin-bottom: 1.5rem; opacity: 0.7;">Ti rispondo appena posso.</p>
      <form id="contact-form" style="display:flex;flex-direction:column;gap:1rem;max-width:480px;">
        <input type="text" name="from_name" placeholder="Il tuo nome" required
               style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:0.75rem 1rem;color:var(--text-primary);font-family:inherit;font-size:0.95rem;outline:none;">
        <input type="email" name="reply_to" placeholder="La tua email" required
               style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:0.75rem 1rem;color:var(--text-primary);font-family:inherit;font-size:0.95rem;outline:none;">
        <textarea name="message" placeholder="Messaggio" rows="5" required
                  style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:0.75rem 1rem;color:var(--text-primary);font-family:inherit;font-size:0.95rem;outline:none;resize:vertical;"></textarea>
        <button type="submit" class="btn-primary" style="align-self:flex-start;">Invia messaggio</button>
        <p id="form-status" style="font-size:0.85rem;opacity:0.7;"></p>
      </form>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button[type="submit"]');
      const status = document.getElementById('form-status');
      btn.disabled = true;
      btn.textContent = 'Invio...';
      emailjs.sendForm('service_castaldi', 'template_contact', this)
        .then(function() {
          status.textContent = 'Messaggio inviato. Grazie!';
          document.getElementById('contact-form').reset();
          btn.textContent = 'Invia messaggio';
          btn.disabled = false;
        }, function(error) {
          status.textContent = 'Errore nell\'invio. Riprova o scrivimi su LinkedIn.';
          btn.textContent = 'Invia messaggio';
          btn.disabled = false;
        });
    });
  </script>

</body>
</html>
